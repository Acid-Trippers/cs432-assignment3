<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pipeline Landing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="page-shell">
        <section class="status-card landing-card">
            <p class="eyebrow">Single Project Lifecycle</p>
            <h1>Reset Or Resume</h1>
            <p class="subtitle">One project, one pipeline. Choose the next valid step from current state.</p>

            <div class="state-row">
                <span>Current pipeline state</span>
                <strong id="pipeline-state" class="state-pill">loading</strong>
            </div>

            <p id="pipeline-busy" class="warning hidden" role="status">Pipeline is running. Controls are temporarily locked.</p>
            <p id="external-api-warning" class="warning hidden" role="alert">
                External API is unreachable. Run <strong>docker compose up -d</strong> before using pipeline endpoints.
            </p>

            <div class="count-row" id="init-count-row">
                <label for="init-count">Initialise record count</label>
                <input id="init-count" type="number" min="1" value="1000">
            </div>

            <div class="action-grid">
                <button id="btn-setup" class="btn btn-primary hidden" type="button">Set Up Schema</button>
                <button id="btn-initialise" class="btn btn-primary hidden" type="button">Run Initialise</button>
                <button id="btn-dashboard" class="btn btn-primary hidden" type="button">Continue to Dashboard</button>
                <button id="btn-reset" class="btn btn-danger" type="button">Reset Everything</button>
            </div>

            <p id="landing-message" class="feedback hidden" role="status"></p>
        </section>
    </main>
    <script src="/static/main.js"></script>
</body>
</html>
